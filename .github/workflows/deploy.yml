name: Vercel-like VPS Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN
          script: |
            cd /var/www/travel-web-app/backend
            
            # Store current commit hash for potential rollback
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            
            # 1. Pull latest code securely using the temporary action token
            # Force local to match remote to prevent "divergent branches" errors
            git fetch https://x-access-token:$GITHUB_TOKEN@github.com/studiocpxp2000/travel-web-app.git main
            git reset --hard FETCH_HEAD || exit 1
            
            # 2. Update dependencies
            npm install || exit 1
            
            # 3. Syntax Check for server.js
            node --check server.js || { 
              echo "Syntax Error! Rolling back..."; 
              git reset --hard $PREVIOUS_COMMIT;
              npm install;
              exit 1; 
            }

            # 3b. Load all modules (without binding a port) to catch require-time crashes before PM2 reload
            node -e "require('./server.js'); console.log('Bootstrap OK'); process.exit(0);" || {
              echo "Bootstrap failed — module load error. Rolling back...";
              git reset --hard $PREVIOUS_COMMIT;
              npm install;
              exit 1;
            }
            
            # 4. Restart the Backend gracefully (ecosystem file sets PORT=8081; --update-env refreshes PM2 env)
            pm2 reload ecosystem.config.js --update-env || pm2 reload travel-app-backend --update-env || exit 1
            
            # 5. Atomic Health Verification
            echo "Verifying backend deployment health..."
            # Use 127.0.0.1 — on some hosts "localhost" resolves to ::1 while the app listens on IPv4 only
            sleep 3
            for i in {1..15}; do
              if curl --fail --max-time 10 http://127.0.0.1:8081/health; then
                echo "Deployment Successful: Health Check Passed!"
                exit 0
              fi
              echo "Attempt $i: App not ready yet, waiting..."
              sleep 3
            done
            
            echo "Deployment Failed: Health Check timed out. PM2 status / recent logs:"
            pm2 describe travel-app-backend || true
            pm2 logs travel-app-backend --lines 40 --nostream || true
            echo "Rolling back to previous working commit..."
            git reset --hard $PREVIOUS_COMMIT
            npm install
            pm2 reload ecosystem.config.js --update-env || pm2 reload travel-app-backend --update-env
            exit 1

  deploy-frontend:
    runs-on: ubuntu-latest
    # Optional: wait for backend to finish first
    needs: deploy-backend 
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN
          script: |
            cd /var/www/travel-web-app/frontend
            
            # Store current commit hash
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            
            # 1. Pull code securely using the temporary action token. If this fails, stop.
            # Force local to match remote to prevent "divergent branches" errors
            git fetch https://x-access-token:$GITHUB_TOKEN@github.com/studiocpxp2000/travel-web-app.git main
            git reset --hard FETCH_HEAD || exit 1
            
            # 2. Install dependencies.
            npm install || exit 1
            
            # 3. Build the Vite React Project.
            # If this fails, roll back to old commit so next attempt isn't broken
            npm run build || {
              echo "Build Failed! Rolling back...";
              git reset --hard $PREVIOUS_COMMIT;
              npm install;
              exit 1;
            }
            
            # 4. Only reload PM2 if the build was successful.
            pm2 reload travel-app-frontend || exit 1
            
            echo "Frontend Deployment Successful!"
